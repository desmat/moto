name: Tests

on:
  pull_request:

permissions:
  contents: read

# a new push to the same PR cancels the still-running build for the previous push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # cache node_modules itself (not just ~/.npm) so npm ci can be skipped entirely
      # when package-lock.json is unchanged
      - name: Cache node_modules
        id: node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci --no-audit --no-fund

      # with the browser binaries cached, this only apt-installs system deps on a hit
      - name: Cache Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test
